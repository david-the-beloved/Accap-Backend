name: Deploy Backend To Fly

'on':
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_APP_NAME: ${{ secrets.FLY_APP_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${FLY_API_TOKEN:-}" || (echo "Missing GitHub secret: FLY_API_TOKEN" && exit 1)
          test -n "${FLY_APP_NAME:-}" || (echo "Missing GitHub secret: FLY_APP_NAME" && exit 1)

      - name: Ensure Fly app exists
        shell: bash
        run: |
          set -euo pipefail
          if ! flyctl apps show "$FLY_APP_NAME" >/dev/null 2>&1; then
            echo "App '$FLY_APP_NAME' not found. Creating it now..."
            if [ -n "${{ secrets.FLY_ORG:- }}" ]; then
              flyctl apps create "$FLY_APP_NAME" --org "${{ secrets.FLY_ORG }}"
            else
              flyctl apps create "$FLY_APP_NAME"
            fi
          fi

      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail
          flyctl deploy --remote-only --app "$FLY_APP_NAME" --config fly.toml
